<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Spese 2026">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/180/wallet.png">
    
    <title>Spese 2026 iPhone v2</title>

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #5a6d82;
            --bg: #f8fafd;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 86, 179, 0.1);
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body { 
            font-family: var(--font-main);
            background-color: var(--bg); 
            margin: 0; padding: 12px; color: #1d1d1f; 
            -webkit-font-smoothing: antialiased;
        }
        
        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at top right, #e3efff, transparent),
                        radial-gradient(circle at bottom left, #f0f4f8, transparent);
            z-index: -1; 
        }

        h1 { text-align: center; font-size: 24px; font-weight: 800; margin: 10px 0 20px 0; letter-spacing: -0.02em; }
        h2 { color: var(--primary); font-size: 14px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-radius: 18px; padding: 18px; border: 1px solid #fff; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.03); margin-bottom: 15px;
        }

        label { font-size: 10px; font-weight: 700; color: var(--secondary); display: block; margin-bottom: 4px; text-transform: uppercase; }
        
        input, select { 
            font-family: var(--font-main); width: 100%; padding: 12px; background: #fff; 
            border: 1px solid var(--border); border-radius: 10px; font-size: 16px; 
            margin-bottom: 12px; box-sizing: border-box; color: #1d1d1f;
        }
        
        button { 
            font-family: var(--font-main); background: var(--primary); color: white; border: none; 
            padding: 14px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
        }

        .stat-box { 
            background: white; padding: 15px; border-radius: 14px; border: 1px solid var(--border); 
            margin-bottom: 10px; text-align: center;
        }
        .stat-box:last-child { margin-bottom: 0; }
        .stat-title { font-size: 10px; color: var(--secondary); font-weight: 700; text-transform: uppercase; text-align: left; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 800; color: var(--primary); }

        .mese-row { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); padding: 12px 0; width: 100%; 
        }
        .mese-row:last-child { border-bottom: none; }
        .mese-nome { font-weight: 600; font-size: 15px; }
        .mese-cifre { font-weight: 700; color: var(--primary); font-size: 13px; white-space: nowrap; }

        .table-wrapper { overflow-x: auto; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        td { padding: 12px 4px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .importo-td { font-weight: 700; color: var(--primary); text-align: right; white-space: nowrap; }
        .cat-badge { font-size: 9px; font-weight: 700; background: #eee; padding: 2px 6px; border-radius: 5px; color: var(--secondary); text-transform: uppercase; }

        .delete-btn { 
            background: transparent; color: var(--secondary); border: none; padding: 6px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.5;
        }
        .delete-btn svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <p style="text-align:center; font-size:8px; color:#ccc; margin-top:5px;">Update: Force IT Format v2</p>
    <h1>App Spese 2026</h1>

    <div class="app-container">
        <div class="card">
            <h2>Nuova Spesa</h2>
            <label>Data</label><input type="date" id="dataSpesa">
            <label>Dettaglio</label><input type="text" id="descrizioneSpesa" placeholder="Dettaglio spesa...">
            <label>Categoria</label>
            <select id="categoriaSpesa">
                <option value="Cibo">Cibo</option>
                <option value="Trasporti">Trasporti</option>
                <option value="Utenze">Utenze</option>
                <option value="Casa">Casa</option>
                <option value="Salute">Salute</option>
                <option value="Svago">Svago</option>
                <option value="Altro">Altro</option>
            </select>
            <label>Somma (€)</label><input type="number" id="importoSpesa" inputmode="decimal" placeholder="0,00" step="0.01">
            <button onclick="aggiungiSpesa()">Salva Spesa</button>
        </div>

        <div class="card">
            <h2>Dashboard</h2>
            <div class="stat-box">
                <div class="stat-title">Spesa Mese</div>
                <div class="stat-value" id="spesaMeseCorrente">0,00 €</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Media / Giorno</div>
                <div class="stat-value" id="mediaMeseCorrente">0,00 €</div>
            </div>
            <div class="stat-box" style="text-align: left; padding-top: 10px;">
                <div class="stat-title" style="margin-bottom: 10px;">Storico Mensile (Totale | Media)</div>
                <div id="spesaPerMeseLista"></div>
            </div>
        </div>

        <div class="card">
            <h2>📥 Importa CSV</h2>
            <input type="file" id="csvFileInput" accept=".csv" style="font-size: 12px; margin-bottom: 0;">
        </div>

        <div class="card">
            <h2>Movimenti</h2>
            <div class="table-wrapper">
                <table id="tabellaSpese">
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let spese = JSON.parse(localStorage.getItem('speseData')) || [];
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];

        // --- FUNZIONE DI FORMATTAZIONE MANUALE (BLINDATA) ---
        function formattaEuro(n) {
            let num = parseFloat(n);
            if (isNaN(num)) num = 0;
            
            // Creiamo la stringa con 2 decimali e virgola
            let parts = num.toFixed(2).split(".");
            // Aggiungiamo il punto delle migliaia manualmente
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            
            return parts.join(",") + " €";
        }

        function aggiornaUI() {
            const oggi = new Date();
            let meseCorr = 0;
            let riepilogo = {};
            
            spese.forEach(s => {
                const d = new Date(s.data);
                if (isNaN(d.getTime())) return;
                const chiave = d.getFullYear() + "-" + d.getMonth();
                if(d.getMonth() === oggi.getMonth() && d.getFullYear() === oggi.getFullYear()) meseCorr += s.importo;
                if(!riepilogo[chiave]) riepilogo[chiave] = { totale: 0, nome: nomiMesi[d.getMonth()] + " " + d.getFullYear(), timestamp: d.getTime(), mese: d.getMonth(), anno: d.getFullYear() };
                riepilogo[chiave].totale += s.importo;
            });

            document.getElementById('spesaMeseCorrente').innerText = formattaEuro(meseCorr);
            document.getElementById('mediaMeseCorrente').innerText = formattaEuro(meseCorr / oggi.getDate());

            let htmlMesi = "";
            Object.keys(riepilogo).sort((a,b) => riepilogo[b].timestamp - riepilogo[a].timestamp).forEach(k => {
                const m = riepilogo[k];
                const dMese = new Date(m.timestamp);
                const ggMese = (m.mese === oggi.getMonth() && m.anno === oggi.getFullYear()) ? oggi.getDate() : new Date(m.anno, m.mese + 1, 0).getDate();
                
                // Formattazione forzata per entrambi
                const tF = formattaEuro(m.totale);
                const mF = formattaEuro(m.totale / ggMese);

                htmlMesi += `<div class="mese-row">
                    <span class="mese-nome">${m.nome}</span>
                    <span class="mese-cifre">${tF} <span style="color:#ddd;font-weight:400">|</span> ${mF}</span>
                </div>`;
            });
            document.getElementById('spesaPerMeseLista').innerHTML = htmlMesi;

            document.querySelector('#tabellaSpese tbody').innerHTML = spese.map((s, i) => `
                <tr>
                    <td style="color:var(--secondary); font-weight:500;">${new Date(s.data).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'})}</td>
                    <td><span style="font-weight:600;">${s.descrizione}</span><br><span class="cat-badge">${s.categoria}</span></td>
                    <td class="importo-td">${formattaEuro(s.importo)}</td>
                    <td style="text-align:right"><button class="delete-btn" onclick="eliminaSpesa(${i})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></td>
                </tr>`).join('');
        }

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/);
                let count = 0;
                lines.forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const sep = line.includes(';') ? ';' : ',';
                    const cols = line.split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length >= 4) {
                        const dParts = cols[0].split('/');
                        if (dParts.length === 3) {
                            let y = parseInt(dParts[2]); if(y < 100) y += 2000;
                            const d = new Date(y, parseInt(dParts[1])-1, parseInt(dParts[0]));
                            const imp = parseFloat(cols[cols.length-1].replace(/[€\s]/g, '').replace(',', '.'));
                            if(!isNaN(d.getTime()) && !isNaN(imp)) {
                                spese.push({ data: d.getTime(), descrizione: cols[1], categoria: cols[2] || "Altro", importo: imp });
                                count++;
                            }
                        }
                    }
                });
                spese.sort((a,b) => b.data - a.data);
                localStorage.setItem('speseData', JSON.stringify(spese));
                aggiornaUI();
                alert("✅ " + count + " spese importate.");
            };
            reader.readAsText(file);
        });

        function aggiungiSpesa() {
            const dVal = document.getElementById('dataSpesa').value, desc = document.getElementById('descrizioneSpesa').value, cat = document.getElementById('categoriaSpesa').value, imp = parseFloat(document.getElementById('importoSpesa').value);
            if(!dVal || !desc || isNaN(imp)) return alert("Dati incompleti!");
            spese.push({ data: new Date(dVal).getTime(), descrizione: desc, categoria: cat, importo: imp });
            spese.sort((a,b) => b.data - a.data);
            localStorage.setItem('speseData', JSON.stringify(spese));
            aggiornaUI();
            document.getElementById('descrizioneSpesa').value = "";
            document.getElementById('importoSpesa').value = "";
        }

        function eliminaSpesa(i) { if(confirm("Cancellare?")) { spese.splice(i,1); localStorage.setItem('speseData', JSON.stringify(spese)); aggiornaUI(); } }

        window.onload = () => { document.getElementById('dataSpesa').valueAsDate = new Date(); aggiornaUI(); };
    </script>
</body>
</html>
