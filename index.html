<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Meta Tag per iOS (App a schermo intero) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spese">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  
  <title>Le Mie Spese</title>
  
  <!-- Tailwind CSS per lo stile -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Nasconde la scrollbar ma mantiene lo scorrimento */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- ICONE SVG INLINE ---
    const Icons = {
      Home: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Plus: (props) => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
      PieChart: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={props.strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
      Utensils: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>,
      Car: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>,
      Coffee: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>,
      Zap: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Cat: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3-9-7.56c0-1.25.5-2.4 1.1-3.48 0 0-1.89-6.42-.5-7 1.39-.58 4.72.23 6.5 2.23A9.04 9.04 0 0 1 12 5Z"/><path d="M8 14v.5"/><path d="M16 14v.5"/><path d="M11.25 16.25h1.5L12 17l-.75-.75Z"/></svg>,
      HeartPulse: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>,
      ShoppingBag: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
      ArrowLeft: (props) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    };

    const CATEGORIES = [
      { id: 'cibo', label: 'Cibo & Spesa', icon: 'Utensils', color: 'bg-orange-500' },
      { id: 'trasporti', label: 'Trasporti', icon: 'Car', color: 'bg-blue-500' },
      { id: 'svago', label: 'Svago', icon: 'Coffee', color: 'bg-purple-500' },
      { id: 'utenze', label: 'Utenze', icon: 'Zap', color: 'bg-yellow-500' },
      { id: 'pet', label: 'Animali', icon: 'Cat', color: 'bg-emerald-500' },
      { id: 'salute', label: 'Salute', icon: 'HeartPulse', color: 'bg-red-500' },
      { id: 'shopping', label: 'Shopping', icon: 'ShoppingBag', color: 'bg-pink-500' },
      { id: 'casa', label: 'Casa', icon: 'Home', color: 'bg-teal-500' },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      
      // Carica i dati dal localStorage o usa quelli di default
      const [transactions, setTransactions] = useState(() => {
        const saved = localStorage.getItem('spese_app_data');
        if (saved) {
          return JSON.parse(saved);
        }
        return [
          { id: 1, amount: 2.90, categoryId: 'utenze', date: '2025-12-01T10:00:00Z', description: 'Canone Conto Hype' },
          { id: 2, amount: 4.80, categoryId: 'trasporti', date: '2025-12-04T10:00:00Z', description: 'Pedaggio MF RM' },
          { id: 3, amount: 37.00, categoryId: 'cibo', date: '2025-12-04T20:00:00Z', description: 'Pizza con Ale' },
          { id: 18, amount: 10.00, categoryId: 'trasporti', date: '2026-02-26T09:00:00Z', description: 'Parcheggio' },
          { id: 19, amount: 18.00, categoryId: 'salute', date: '2026-03-06T08:30:00Z', description: 'Analisi sangue' }
        ];
      });

      // Salva automaticamente nel localStorage ogni volta che le transazioni cambiano
      useEffect(() => {
        localStorage.setItem('spese_app_data', JSON.stringify(transactions));
      }, [transactions]);

      const formatMoney = (amount) => new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(amount);
      const formatDate = (isoString) => {
        const date = new Date(isoString);
        return new Intl.DateTimeFormat('it-IT', { day: '2-digit', month: 'short' }).format(date);
      };

      const deleteTransaction = (id) => {
        if(confirm("Vuoi eliminare questa spesa?")) {
            setTransactions(transactions.filter(t => t.id !== id));
        }
      };

      const HomeView = () => {
        const totalSpent = transactions.reduce((sum, tx) => sum + tx.amount, 0);
        return (
          <div className="p-6 pb-32 animate-[fadeIn_0.3s_ease-out]">
            <div className="text-center mb-8 pt-10">
              <p className="text-gray-500 text-sm font-medium uppercase tracking-wider mb-1">Totale Spese</p>
              <h1 className="text-5xl font-bold text-gray-900 tracking-tight">{formatMoney(totalSpent)}</h1>
            </div>
            <div className="flex justify-between items-end mb-4">
              <h2 className="text-xl font-bold text-gray-800">Transazioni</h2>
            </div>
            <div className="space-y-4">
              {transactions.length === 0 && <p className="text-center text-gray-400 py-8">Nessuna spesa registrata.</p>}
              {transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).map(tx => {
                const category = CATEGORIES.find(c => c.id === tx.categoryId) || CATEGORIES[0];
                const IconComponent = Icons[category.icon];
                
                return (
                  <div key={tx.id} onClick={() => deleteTransaction(tx.id)} className="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border border-gray-100 active:scale-95 transition-transform">
                    <div className="flex items-center gap-4 overflow-hidden">
                      <div className={`w-12 h-12 shrink-0 rounded-full ${category.color} text-white flex items-center justify-center shadow-sm`}>
                        <IconComponent />
                      </div>
                      <div className="overflow-hidden">
                        <p className="font-semibold text-gray-900 truncate">{tx.description || category.label}</p>
                        <p className="text-xs text-gray-500 flex gap-1 truncate">
                          <span>{category.label}</span><span>• {formatDate(tx.date)}</span>
                        </p>
                      </div>
                    </div>
                    <div className="font-bold text-gray-900 ml-2 shrink-0">-{formatMoney(tx.amount)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const AddView = () => {
        const [amount, setAmount] = useState('');
        const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0].id);
        const [description, setDescription] = useState('');

        const handleSave = () => {
          if (!amount || isNaN(amount) || Number(amount) <= 0) return;
          const newTx = {
            id: Date.now(),
            amount: Number(amount),
            categoryId: selectedCategory,
            date: new Date().toISOString(),
            description: description
          };
          setTransactions([...transactions, newTx]);
          setActiveTab('home');
        };

        return (
          <div className="h-full bg-gray-50 flex flex-col pt-10 animate-[slideIn_0.3s_ease-out]">
            <div className="px-4 py-4 flex items-center justify-between mb-2">
              <button onClick={() => setActiveTab('home')} className="text-blue-500 p-2"><Icons.ArrowLeft /></button>
              <h2 className="text-lg font-bold text-gray-800">Nuova Spesa</h2>
              <div className="w-8"></div>
            </div>
            <div className="p-6 flex-1 overflow-y-auto pb-32 no-scrollbar">
              <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mb-8 flex flex-col items-center">
                <p className="text-gray-400 font-medium mb-2">Inserisci importo</p>
                <div className="flex items-center justify-center text-5xl font-bold text-gray-900">
                  <span className="text-3xl text-gray-400 mr-2">€</span>
                  <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" className="w-full max-w-[150px] bg-transparent outline-none text-center placeholder-gray-300 appearance-none" step="0.01" autoFocus/>
                </div>
              </div>
              <h3 className="font-bold text-gray-800 mb-4 px-1">Categoria</h3>
              <div className="grid grid-cols-4 gap-4 mb-8">
                {CATEGORIES.map(cat => {
                  const IconComponent = Icons[cat.icon];
                  const isSelected = selectedCategory === cat.id;
                  return (
                    <button key={cat.id} onClick={() => setSelectedCategory(cat.id)} className={`flex flex-col items-center gap-2 ${isSelected ? 'opacity-100' : 'opacity-40 grayscale'}`}>
                      <div className={`w-14 h-14 rounded-full ${cat.color} text-white flex items-center justify-center shadow-md ${isSelected ? 'ring-4 ring-offset-2 ring-blue-500/30' : ''}`}>
                        <IconComponent />
                      </div>
                      <span className={`text-[10px] font-medium text-center ${isSelected ? 'text-gray-900' : 'text-gray-500'}`}>{cat.label}</span>
                    </button>
                  );
                })}
              </div>
              <h3 className="font-bold text-gray-800 mb-4 px-1">Descrizione</h3>
              <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Cosa hai comprato?" className="w-full bg-white p-4 rounded-xl border border-gray-200 outline-none focus:border-blue-500 shadow-sm text-lg"/>
            </div>
            <div className="fixed bottom-[100px] left-0 w-full px-6 z-50">
              <button onClick={handleSave} disabled={!amount || Number(amount) <= 0} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 active:scale-[0.98] transition-all disabled:opacity-50">Salva Spesa</button>
            </div>
          </div>
        );
      };

      const StatsView = () => {
        const total = transactions.reduce((sum, tx) => sum + tx.amount, 0);
        const stats = CATEGORIES.map(cat => {
          const spent = transactions.filter(tx => tx.categoryId === cat.id).reduce((sum, tx) => sum + tx.amount, 0);
          return { ...cat, spent, percentage: total > 0 ? (spent / total) * 100 : 0 };
        }).filter(s => s.spent > 0).sort((a, b) => b.spent - a.spent);

        return (
          <div className="p-6 pb-32 pt-10 animate-[fadeIn_0.3s_ease-out]">
            <h1 className="text-3xl font-bold text-gray-900 mb-8 pt-4">Statistiche</h1>
            {stats.length === 0 ? <p className="text-center text-gray-400 py-8">Nessun dato.</p> : (
              <div className="space-y-6">
                {stats.map(stat => {
                  const IconComponent = Icons[stat.icon];
                  return (
                    <div key={stat.id}>
                      <div className="flex justify-between items-end mb-2">
                        <div className="flex items-center gap-2">
                          <div className={`w-6 h-6 rounded-full ${stat.color} flex items-center justify-center text-white`}><IconComponent width="12" height="12" /></div>
                          <span className="font-medium text-gray-800">{stat.label}</span>
                        </div>
                        <span className="font-bold text-gray-900">{formatMoney(stat.spent)}</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-2.5">
                        <div className={`${stat.color} h-2.5 rounded-full`} style={{ width: `${stat.percentage}%` }}></div>
                      </div>
                    </div>
                  )
                })}
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="w-full h-screen bg-gray-50 flex flex-col">
          <div className="flex-1 overflow-y-auto no-scrollbar relative">
            {activeTab === 'home' && <HomeView />}
            {activeTab === 'add' && <AddView />}
            {activeTab === 'stats' && <StatsView />}
          </div>
          <div className="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 pb-8 pt-4 px-6 z-40">
            <div className="flex justify-around items-center">
              <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 ${activeTab === 'home' ? 'text-blue-600' : 'text-gray-400'}`}>
                <Icons.Home />
                <span className="text-[10px] font-medium">Home</span>
              </button>
              <div className="relative -top-8">
                <button onClick={() => setActiveTab('add')} className="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/40 active:scale-95 border-4 border-gray-50">
                  <Icons.Plus />
                </button>
              </div>
              <button onClick={() => setActiveTab('stats')} className={`flex flex-col items-center gap-1 ${activeTab === 'stats' ? 'text-blue-600' : 'text-gray-400'}`}>
                <Icons.PieChart />
                <span className="text-[10px] font-medium">Statistiche</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</body>
</html>
