<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="App Spese">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/180/wallet.png">
    
    <title>App Spese Finale 1.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #5a6d82;
            --bg: #f8fafd;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 86, 179, 0.1);
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg); 
            margin: 0; padding: 12px; color: #1d1d1f; min-height: 100vh;
        }
        
        .app-container { display: flex; flex-direction: column; gap: 15px; max-width: 1300px; margin: 0 auto; }
        
        @media (min-width: 1024px) {
            body { padding: 40px; }
            .app-container { display: grid; grid-template-columns: 360px 1fr; gap: 40px; }
            .sidebar { position: sticky; top: 40px; }
        }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-radius: 20px; padding: 20px; border: 1px solid #fff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px;
        }

        h1 { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 25px; }
        h2 { color: var(--primary); font-size: 14px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }

        input, select { 
            font-family: var(--font-main); width: 100%; padding: 12px; background: #fff; 
            border: 1px solid var(--border); border-radius: 12px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box;
        }
        
        button { 
            font-family: var(--font-main); background: var(--primary); color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
        }

        .stats-grid { display: flex; flex-direction: column; gap: 12px; }
        @media (min-width: 768px) { .stats-grid { display: grid; grid-template-columns: 1fr 1fr; } .stat-box.full { grid-column: span 2; } }

        .stat-box { 
            background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center;
        }
        .stat-title { font-size: 10px; color: var(--secondary); font-weight: 700; text-transform: uppercase; text-align: left; margin-bottom: 5px; }
        .stat-value { font-size: 26px; font-weight: 800; color: var(--primary); }

        .mese-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .mese-nome { font-weight: 600; }
        .mese-cifre { font-weight: 700; color: var(--primary); }

        .grafici-container { display: none; margin-top: 20px; }
        .chart-box { background: white; padding: 15px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        td { padding: 12px 5px; border-bottom: 1px solid var(--border); }
        .cat-badge { font-size: 10px; font-weight: 700; background: #eee; padding: 3px 8px; border-radius: 6px; color: var(--secondary); }
        .delete-btn { background: transparent; border: none; color: var(--secondary); cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <p style="text-align:center; font-size:9px; color:#ccc;">Versione Finale 1.2</p>
            <h1>App Spese</h1>
            <div class="card">
                <h2>Nuova Spesa</h2>
                <input type="date" id="dataSpesa">
                <input type="text" id="descrizioneSpesa" placeholder="Descrizione (es. Pizza)">
                <select id="categoriaSpesa">
                    <option value="Cibo">Cibo</option>
                    <option value="Trasporti">Trasporti</option>
                    <option value="Utenze">Utenze</option>
                    <option value="Casa">Casa</option>
                    <option value="Salute">Salute</option>
                    <option value="Svago">Svago</option>
                    <option value="Altro">Altro</option>
                </select>
                <input type="number" id="importoSpesa" inputmode="decimal" placeholder="0.00">
                <button onclick="aggiungiSpesa()">Salva</button>
            </div>
            <div class="card">
                <h2>Importa CSV</h2>
                <input type="file" id="csvFileInput" accept=".csv" style="font-size:12px;">
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-title">Mese Corrente</div>
                        <div class="stat-value" id="spesaMeseCorrente">0,00 €</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-title">Media Giorno</div>
                        <div class="stat-value" id="mediaMeseCorrente">0,00 €</div>
                    </div>
                    <div class="stat-box full">
                        <div class="stat-title">Storico Mensile</div>
                        <div id="spesaPerMeseLista"></div>
                    </div>
                </div>
                
                <button id="btnToggleGrafici" style="margin-top:20px; background: var(--secondary);" onclick="toggleGrafici()">📊 Mostra Analisi</button>
                
                <div class="grafici-container" id="graficiContainer">
                    <div class="chart-box"><canvas id="chartCategorie"></canvas></div>
                    <div class="chart-box"><canvas id="chartMesi"></canvas></div>
                </div>
            </div>

            <div class="card">
                <h2>Movimenti</h2>
                <div style="overflow-x:auto;">
                    <table id="tabellaSpese">
                        <thead><tr><th align="left">Data</th><th align="left">Dettaglio</th><th align="right">Euro</th><th></th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let spese = JSON.parse(localStorage.getItem('speseData')) || [];
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        let chart1, chart2;

        function formattaEuro(n) { return parseFloat(n).toLocaleString('it-IT', { minimumFractionDigits: 2 }) + " €"; }

        function aggiornaUI() {
            const oggi = new Date();
            let meseCorr = 0;
            let riepilogo = {};
            
            spese.forEach(s => {
                const d = new Date(s.data);
                if (isNaN(d.getTime())) return;
                
                // Normalizziamo la chiave del mese per evitare doppioni
                const chiave = d.getFullYear() + "-" + d.getMonth();
                
                if(d.getMonth() === oggi.getMonth() && d.getFullYear() === oggi.getFullYear()) meseCorr += s.importo;
                
                if(!riepilogo[chiave]) {
                    riepilogo[chiave] = { totale: 0, nome: nomiMesi[d.getMonth()] + " " + d.getFullYear(), ts: new Date(d.getFullYear(), d.getMonth(), 1).getTime() };
                }
                riepilogo[chiave].totale += s.importo;
            });

            document.getElementById('spesaMeseCorrente').innerText = formattaEuro(meseCorr);
            document.getElementById('mediaMeseCorrente').innerText = formattaEuro(meseCorr / oggi.getDate());

            let htmlMesi = "";
            Object.keys(riepilogo).sort((a,b) => riepilogo[b].ts - riepilogo[ts]).forEach(k => {
                const m = riepilogo[k];
                const dM = new Date(m.ts);
                const gg = (dM.getMonth() === oggi.getMonth()) ? oggi.getDate() : new Date(dM.getFullYear(), dMese.getMonth()+1, 0).getDate();
                htmlMesi += `<div class="mese-row"><span>${m.nome}</span><span class="mese-cifre">${formattaEuro(m.totale)} | ${formattaEuro(m.totale/gg)}</span></div>`;
            });
            document.getElementById('spesaPerMeseLista').innerHTML = htmlMesi;

            document.querySelector('#tabellaSpese tbody').innerHTML = spese.map((s, i) => `
                <tr>
                    <td style="color:#888">${new Date(s.data).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'})}</td>
                    <td><b>${s.descrizione}</b><br><span class="cat-badge">${s.categoria}</span></td>
                    <td align="right"><b>${formattaEuro(s.importo)}</b></td>
                    <td align="right"><button class="delete-btn" onclick="eliminaSpesa(${i})">✕</button></td>
                </tr>`).join('');
            
            if(document.getElementById('graficiContainer').style.display === 'block') disegnaGrafici();
        }

        function aggiungiSpesa() {
            const d = document.getElementById('dataSpesa').value, desc = document.getElementById('descrizioneSpesa').value, cat = document.getElementById('categoriaSpesa').value, imp = parseFloat(document.getElementById('importoSpesa').value);
            if(!d || !desc || isNaN(imp)) return alert("Dati incompleti!");
            spese.push({ data: new Date(d).getTime(), descrizione: desc, categoria: cat, importo: imp });
            spese.sort((a,b) => b.data - a.data);
            localStorage.setItem('speseData', JSON.stringify(spese));
            aggiornaUI();
        }

        function eliminaSpesa(i) { if(confirm("Eliminare?")) { spese.splice(i,1); localStorage.setItem('speseData', JSON.stringify(spese)); aggiornaUI(); } }

        function toggleGrafici() {
            const g = document.getElementById('graficiContainer'), b = document.getElementById('btnToggleGrafici');
            const vis = g.style.display === 'block';
            g.style.display = vis ? 'none' : 'block';
            b.innerText = vis ? '📊 Mostra Analisi' : '🔼 Nascondi Analisi';
            if(!vis) disegnaGrafici();
        }

        function disegnaGrafici() {
            if(chart1) chart1.destroy(); if(chart2) chart2.destroy();
            
            let catSum = {}; let mesiSum = {};
            
            // LOGICA DI RAGGRUPPAMENTO FORZATA
            spese.forEach(s => {
                // Raggruppa per la Categoria scelta dal menu, NON per la descrizione
                let c = s.categoria || "Altro";
                catSum[c] = (catSum[c] || 0) + s.importo;
                
                let d = new Date(s.data);
                let k = nomiMesi[d.getMonth()] + " " + d.getFullYear();
                mesiSum[k] = (mesiSum[k] || 0) + s.importo;
            });

            const pal = ['#0056b3', '#00a8ff', '#5a6d82', '#a1c4fd', '#708090', '#c2e9fb'];

            chart1 = new Chart(document.getElementById('chartCategorie'), {
                type: 'doughnut',
                data: { labels: Object.keys(catSum), datasets: [{ data: Object.values(catSum), backgroundColor: pal }] },
                options: { plugins: { title: { display: true, text: 'SPESE PER CATEGORIA' } } }
            });

            chart2 = new Chart(document.getElementById('chartMesi'), {
                type: 'bar',
                data: { labels: Object.keys(mesiSum).reverse(), datasets: [{ label: 'Euro', data: Object.values(mesiSum).reverse(), backgroundColor: '#0056b3' }] },
                options: { plugins: { title: { display: true, text: 'ANDAMENTO MENSILE' }, legend: {display:false} } }
            });
        }

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/);
                lines.forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const sep = line.includes(';') ? ';' : ',';
                    const cols = line.split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length >= 4) {
                        const dP = cols[0].split('/');
                        let y = parseInt(dP[2]); if(y < 100) y += 2000;
                        const d = new Date(y, parseInt(dP[1])-1, parseInt(dP[0]));
                        const imp = parseFloat(cols[cols.length-1].replace(/[€\s]/g, '').replace(',', '.'));
                        if(!isNaN(d.getTime()) && !isNaN(imp)) {
                            spese.push({ data: d.getTime(), descrizione: cols[1], categoria: cols[2] || "Altro", importo: imp });
                        }
                    }
                });
                spese.sort((a,b) => b.data - a.data);
                localStorage.setItem('speseData', JSON.stringify(spese));
                aggiornaUI();
            };
            reader.readAsText(file);
        });

        window.onload = () => { document.getElementById('dataSpesa').valueAsDate = new Date(); aggiornaUI(); };
    </script>
</body>
</html>
