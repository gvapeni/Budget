<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Spese 2026">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/180/wallet.png">
    
    <title>Spese App Pro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #0056b3;
            --secondary: #5a6d82;
            --bg: #f8fafd;
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 86, 179, 0.15);
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg); 
            margin: 0; padding: 12px; color: #1d1d1f; -webkit-font-smoothing: antialiased;
        }
        
        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at top right, #e3efff, transparent),
                        radial-gradient(circle at bottom left, #f0f4f8, transparent);
            z-index: -1; 
        }

        h1 { text-align: center; font-size: 24px; font-weight: 800; margin: 10px 0 20px 0; }
        h2 { color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 15px; }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-radius: 20px; padding: 18px; border: 1px solid #fff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 15px;
        }

        label { font-size: 10px; font-weight: 700; color: var(--secondary); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { 
            font-family: var(--font-main); width: 100%; padding: 14px; background: #fff; 
            border: 1px solid var(--border); border-radius: 12px; font-size: 16px; 
            margin-bottom: 12px; box-sizing: border-box; color: #1d1d1f;
        }
        
        button { 
            font-family: var(--font-main); background: var(--primary); color: white; border: none; 
            padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        button.btn-secondary { background: var(--secondary); margin-top: 10px; font-size: 14px; padding: 12px;}
        button.btn-export { background: #28a745; margin-top: 15px; } /* Verde per export */

        .stat-box { 
            background: #fff; padding: 16px; border-radius: 16px; border: 1px solid var(--border); 
            margin-bottom: 12px; text-align: center;
        }
        .stat-title { font-size: 10px; color: var(--secondary); font-weight: 700; text-transform: uppercase; text-align: left; margin-bottom: 6px; }
        .stat-value { font-size: 26px; font-weight: 800; color: var(--primary); }

        .mese-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 14px 0; }
        .mese-nome { font-weight: 600; font-size: 15px; }
        .mese-cifre { font-weight: 700; color: var(--primary); font-size: 13px; }

        .grafici-container { display: none; flex-direction: column; gap: 15px; margin-top: 20px; }
        .chart-box { background: #fff; padding: 15px; border-radius: 14px; border: 1px solid var(--border); }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        td { padding: 14px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .importo-td { font-weight: 700; color: var(--primary); text-align: right; white-space: nowrap; }
        .cat-badge { font-size: 9px; font-weight: 800; background: #f0f2f5; padding: 3px 7px; border-radius: 6px; color: var(--secondary); text-transform: uppercase; }
        
        .delete-btn { background: transparent; color: var(--secondary); border: none; padding: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.6; width: auto; }
        .delete-btn svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <h1>App Spese</h1>

    <div class="app-container">
        <div class="card">
            <h2>Nuova Spesa</h2>
            <label>Data</label><input type="date" id="dataSpesa">
            <label>Descrizione</label><input type="text" id="descrizioneSpesa" placeholder="Es. Supermercato, Benzina...">
            <label>Categoria</label>
            <select id="categoriaSpesa">
                <option value="Cibo">Cibo</option>
                <option value="Trasporti">Trasporti</option>
                <option value="Utenze">Utenze</option>
                <option value="Casa">Casa</option>
                <option value="Salute">Salute</option>
                <option value="Svago">Svago</option>
                <option value="Altro">Altro</option>
            </select>
            <label>Importo (€)</label><input type="number" id="importoSpesa" inputmode="decimal" placeholder="0,00" step="0.01">
            <button onclick="aggiungiSpesa()">Salva Spesa</button>
        </div>

        <div class="card">
            <h2>Dashboard</h2>
            <div class="stat-box">
                <div class="stat-title">Spesa Mese</div>
                <div class="stat-value" id="spesaMeseCorrente">0,00 €</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Media / Giorno</div>
                <div class="stat-value" id="mediaMeseCorrente">0,00 €</div>
            </div>
            <div class="stat-box" style="text-align: left;">
                <div class="stat-title">Storico Mensile (Totale | Media)</div>
                <div id="spesaPerMeseLista"></div>
            </div>

            <button id="btnToggleGrafici" class="btn-secondary" onclick="toggleGrafici()">📊 Mostra Analisi Grafiche</button>
            
            <div class="grafici-container" id="graficiContainer">
                <div class="chart-box"><canvas id="chartCategorie"></canvas></div>
                <div class="chart-box"><canvas id="chartMesi"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h2>Gestione Dati</h2>
            <label>📥 Importa da CSV (Sostituisce i dati esistenti)</label>
            <input type="file" id="csvFileInput" accept=".csv" style="font-size: 12px;">
            <button class="btn-export" onclick="esportaCSV()">📤 Esporta Storico (CSV)</button>
        </div>

        <div class="card">
            <h2>Movimenti</h2>
            <div style="overflow-x: auto;">
                <table id="tabellaSpese">
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let spese = JSON.parse(localStorage.getItem('speseData')) || [];
        const nomiMesi = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        let chart1, chart2;

        // Formattazione Punti Migliaia Forza Bruta
        function formattaEuro(n) {
            let num = parseFloat(n) || 0;
            let parts = num.toFixed(2).split(".");
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return parts.join(",") + " €";
        }

        function aggiornaUI() {
            const oggi = new Date();
            let meseCorr = 0;
            let riepilogo = {};
            
            spese.forEach(s => {
                const d = new Date(s.data);
                if (isNaN(d.getTime())) return;
                const chiave = d.getFullYear() + "-" + d.getMonth();
                if(d.getMonth() === oggi.getMonth() && d.getFullYear() === oggi.getFullYear()) meseCorr += s.importo;
                if(!riepilogo[chiave]) riepilogo[chiave] = { totale: 0, nome: nomiMesi[d.getMonth()] + " " + d.getFullYear(), ts: d.getTime(), m: d.getMonth(), a: d.getFullYear() };
                riepilogo[chiave].totale += s.importo;
            });

            document.getElementById('spesaMeseCorrente').innerText = formattaEuro(meseCorr);
            document.getElementById('mediaMeseCorrente').innerText = formattaEuro(meseCorr / oggi.getDate());

            let htmlMesi = "";
            Object.keys(riepilogo).sort((a,b) => riepilogo[b].ts - riepilogo[a].ts).forEach(k => {
                const item = riepilogo[k];
                const gg = (item.m === oggi.getMonth() && item.a === oggi.getFullYear()) ? oggi.getDate() : new Date(item.a, item.m + 1, 0).getDate();
                htmlMesi += `<div class="mese-row"><span class="mese-nome">${item.nome}</span><span class="mese-cifre">${formattaEuro(item.totale)} | ${formattaEuro(item.totale/gg)}</span></div>`;
            });
            document.getElementById('spesaPerMeseLista').innerHTML = htmlMesi;

            document.querySelector('#tabellaSpese tbody').innerHTML = spese.map((s, i) => `
                <tr>
                    <td style="color:#8e8e93; font-size:12px;">${new Date(s.data).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'})}</td>
                    <td><b>${s.descrizione}</b><br><span class="cat-badge">${s.categoria}</span></td>
                    <td class="importo-td">${formattaEuro(s.importo)}</td>
                    <td style="text-align:right; width:40px;">
                        <button class="delete-btn" onclick="eliminaSpesa(${i})">
                            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </td>
                </tr>`).join('');
                
            if (document.getElementById('graficiContainer').style.display === 'flex') {
                disegnaGrafici();
            }
        }

        // --- GRAFICI OTTIMIZZATI PER IPHONE ---
        function toggleGrafici() {
            const g = document.getElementById('graficiContainer');
            const b = document.getElementById('btnToggleGrafici');
            if (g.style.display === 'flex') {
                g.style.display = 'none';
                b.innerText = '📊 Mostra Analisi Grafiche';
            } else {
                g.style.display = 'flex';
                b.innerText = '🔼 Nascondi Analisi';
                // Ritardiamo il disegno di 50 millisecondi per dare tempo all'iPhone di mostrare il box, evitando glitch
                setTimeout(disegnaGrafici, 50); 
            }
        }

        function disegnaGrafici() {
            if(chart1) chart1.destroy();
            if(chart2) chart2.destroy();
            
            let catSum = {}; 
            let mesiSum = {};
            
            spese.forEach(s => {
                let c = s.categoria || "Altro";
                catSum[c] = (catSum[c] || 0) + s.importo; // Raggruppa per Categoria
                
                let d = new Date(s.data);
                let k = nomiMesi[d.getMonth()] + " " + d.getFullYear();
                mesiSum[k] = (mesiSum[k] || 0) + s.importo;
            });

            const palette = ['#0056b3', '#00a8ff', '#5a6d82', '#a1c4fd', '#708090', '#c2e9fb'];

            chart1 = new Chart(document.getElementById('chartCategorie'), {
                type: 'doughnut',
                data: { labels: Object.keys(catSum), datasets: [{ data: Object.values(catSum), backgroundColor: palette, borderWidth: 2, borderColor: '#fff' }] },
                options: { plugins: { title: { display: true, text: 'SPESE PER CATEGORIA', font: {size: 13} }, legend: { position: 'bottom' } }, responsive: true }
            });

            chart2 = new Chart(document.getElementById('chartMesi'), {
                type: 'bar',
                data: { labels: Object.keys(mesiSum).reverse(), datasets: [{ label: 'Euro', data: Object.values(mesiSum).reverse(), backgroundColor: '#0056b3', borderRadius: 4 }] },
                options: { plugins: { title: { display: true, text: 'ANDAMENTO MENSILE', font: {size: 13} }, legend: { display: false } }, responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        // --- NUOVA FUNZIONE: ESPORTA CSV ---
        function esportaCSV() {
            if (spese.length === 0) return alert("Non ci sono spese da esportare!");
            
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Data;Descrizione;Categoria;Importo\n"; // Intestazioni
            
            spese.forEach(s => {
                let d = new Date(s.data);
                let stringaData = d.getDate().toString().padStart(2, '0') + "/" + (d.getMonth() + 1).toString().padStart(2, '0') + "/" + d.getFullYear();
                let desc = s.descrizione.replace(/;/g, ","); // Evita che i punti e virgola rompano il file
                let imp = s.importo.toString().replace(".", ","); // Formato decimale italiano
                
                csvContent += `${stringaData};${desc};${s.categoria};${imp}\n`;
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Storico_Spese.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- IMPORTAZIONE ---
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/);
                let count = 0;
                lines.forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const sep = line.includes(';') ? ';' : ',';
                    const cols = line.split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length >= 4) {
                        const dParts = cols[0].split('/');
                        if (dParts.length === 3) {
                            let y = parseInt(dParts[2]); if(y < 100) y += 2000;
                            const d = new Date(y, parseInt(dParts[1])-1, parseInt(dParts[0]));
                            const imp = parseFloat(cols[cols.length-1].replace(/[€\s]/g, '').replace(',', '.'));
                            if(!isNaN(d.getTime()) && !isNaN(imp)) {
                                spese.push({ data: d.getTime(), descrizione: cols[1], categoria: cols[2] || "Altro", importo: imp });
                                count++;
                            }
                        }
                    }
                });
                spese.sort((a,b) => b.data - a.data);
                localStorage.setItem('speseData', JSON.stringify(spese));
                aggiornaUI();
                alert("✅ " + count + " spese importate.");
            };
            reader.readAsText(file);
        });

        function aggiungiSpesa() {
            const d = document.getElementById('dataSpesa').value, desc = document.getElementById('descrizioneSpesa').value, cat = document.getElementById('categoriaSpesa').value, imp = parseFloat(document.getElementById('importoSpesa').value);
            if(!d || !desc || isNaN(imp)) return alert("Compila tutti i campi!");
            spese.push({ data: new Date(d).getTime(), descrizione: desc, categoria: cat, importo: imp });
            spese.sort((a,b) => b.data - a.data);
            localStorage.setItem('speseData', JSON.stringify(spese));
            aggiornaUI();
            document.getElementById('descrizioneSpesa').value = "";
            document.getElementById('importoSpesa').value = "";
        }

        function eliminaSpesa(i) { 
            if(confirm("Vuoi eliminare questa spesa?")) { 
                spese.splice(i,1); 
                localStorage.setItem('speseData', JSON.stringify(spese)); 
                aggiornaUI(); 
            } 
        }

        window.onload = () => { document.getElementById('dataSpesa').valueAsDate = new Date(); aggiornaUI(); };
    </script>
</body>
</html>
